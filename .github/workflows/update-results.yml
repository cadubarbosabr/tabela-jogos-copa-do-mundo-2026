name: Atualizar Resultados Copa 2026

on:
  schedule:
    # Executa a cada 15 minutos durante o período do torneio
    - cron: '*/15 * * * *'
  workflow_dispatch: # Permite execução manual pelo painel do GitHub Actions

permissions:
  contents: write

jobs:
  update:
    name: Buscar e publicar resultados
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Buscar resultados via ESPN API
        run: node scripts/fetch-results.mjs

      - name: Publicar alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/results.json
          if git diff --staged --quiet; then
            echo "✅ Nenhuma alteração nos resultados."
          else
            git commit -m "chore: atualizar resultados [skip ci]"
            if ! git push; then
              echo "⚠️ Push falhou; tentando rebase e novo push..."
              git pull --rebase origin HEAD
              git push
            fi
            echo "✅ Resultados atualizados e publicados."
          fi
