name: Atualizar Resultados Copa 2026

on:
  schedule:
  # Atualiza de 30 em 30 minutos entre 11:00 e 23:59 (UTC-3 Brasil)
  # Horário UTC: 14:00 até 02:59
  - cron: '*/30 14-23,0-2 * * *'
  workflow_dispatch: # Permite execução manual pelo painel do GitHub Actions

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: true

jobs:
  update:
    name: Buscar e publicar resultados
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Buscar resultados via ESPN API
        id: fetch
        run: node scripts/fetch-results.mjs
        continue-on-error: true

      - name: Exibir resumo da atualização
        if: always()
        run: |
          node -e "const fs=require('node:fs'); const raw=fs.readFileSync('public/results.json','utf8'); const data=JSON.parse(raw||'{}'); const resultKeys=Object.keys(data).filter(k=>k!=='_meta'); console.log('Resultados encontrados:', resultKeys.length); console.log('Meta:', data._meta ?? null);"

      - name: Publicar alterações
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/results.json
          if git diff --staged --quiet; then
            echo "✅ Nenhuma alteração nos resultados."
          else
            git commit -m "chore: atualizar resultados [skip ci]"
            if ! git push; then
              echo "⚠️ Push falhou; tentando rebase e novo push..."
              git pull --rebase origin HEAD
              git push
            fi
            echo "✅ Resultados atualizados e publicados."
          fi

      - name: Falhar se lacunas detectadas
        if: steps.fetch.outcome == 'failure'
        run: |
          echo "❌ O script de busca encerrou com erro (exit code não-zero)."
          echo "   Causas possíveis: lacunas de cobertura detectadas OU falha inesperada."
          echo "   Consulte os logs do passo 'Buscar resultados via ESPN API' acima para o diagnóstico completo."
          exit 1
