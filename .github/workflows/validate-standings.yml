name: Validar Classificação ESPN

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-standings
  cancel-in-progress: true

jobs:
  validate:
    name: Comparar classificação com a ESPN
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Validar classificação
        run: node scripts/validate-standings.mjs
